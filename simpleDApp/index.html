<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Storage DApp</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #eef2ff, #f8fafc);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 520px;
            background: white;
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.12);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 30px;
            color: #111827;
        }

        .subtitle {
            margin: 0 0 24px;
            color: #6b7280;
            font-size: 15px;
        }

        .section {
            margin-bottom: 20px;
        }

        .label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #374151;
            font-weight: 600;
        }

        .wallet-box,
        .result-box {
            width: 100%;
            min-height: 48px;
            padding: 12px 14px;
            border-radius: 12px;
            background: #f3f4f6;
            color: #111827;
            word-break: break-all;
            font-size: 14px;
            border: 1px solid #e5e7eb;
        }

        .input-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        input {
            flex: 1;
            min-width: 200px;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
        }

        input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .btn {
            border: none;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .btn-primary {
            background: #4f46e5;
            color: white;
        }

        .btn-primary:hover {
            background: #4338ca;
        }

        .btn-secondary {
            background: #111827;
            color: white;
        }

        .btn-secondary:hover {
            background: #1f2937;
        }

        .btn-light {
            background: #e5e7eb;
            color: #111827;
        }

        .btn-light:hover {
            background: #d1d5db;
        }

        .button-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .status {
            margin-top: 8px;
            font-size: 14px;
            color: #6b7280;
        }

        @media (max-width: 600px) {
            .card {
                padding: 20px;
            }

            h1 {
                font-size: 26px;
            }

            .btn,
            input {
                width: 100%;
            }

            .input-row {
                flex-direction: column;
            }

            .button-row {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Simple Storage DApp</h1>
        <p class="subtitle">Store and read messages from your smart contract on Sepolia.</p>

        <div class="section">
            <button class="btn btn-primary" onclick="connectWallet()">Connect Wallet</button>
            <p class="status">Connect MetaMask first before interacting with the contract.</p>
        </div>

        <div class="section">
            <label class="label">Connected Wallet</label>
            <div id="account" class="wallet-box">Not connected</div>
        </div>

        <div class="section">
            <label class="label" for="newMessage">New Message</label>
            <div class="input-row">
                <input type="text" id="newMessage" placeholder="Enter a new message">
            </div>

            <div class="button-row">
                <button class="btn btn-secondary" onclick="setMessage()">Set Message</button>
                <button class="btn btn-light" onclick="getMessage()">Get Message</button>
            </div>
        </div>

        <div class="section">
            <label class="label">Current Message</label>
            <div id="result" class="result-box">Message will appear here</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
